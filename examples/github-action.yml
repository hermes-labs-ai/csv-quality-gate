name: csv-quality-gate

on:
  pull_request:
  push:

jobs:
  validate-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install csv-quality-gate
      - run: csv-quality-gate check data/leads.csv --profile outreach
